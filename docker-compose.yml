services:
  postgres:
    image: postgres:16-alpine
    container_name: vitalize-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitalize
      POSTGRES_PASSWORD: vitalize_dev
      POSTGRES_DB: vitalize
    ports:
      - "5432:5432"
    volumes:
      - vitalize_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalize -d vitalize"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vitalize_pgdata:
